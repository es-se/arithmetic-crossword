<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Math Crossword</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>Math Crossword</h1>
      <div class="controls">
        <div class="field">
          <label for="difficulty">難易度:</label>
          <select id="difficulty">
            <option value="easy">簡単</option>
            <option value="normal" selected>普通</option>
            <option value="hard">難しい</option>
          </select>
        </div>
        <div class="field">
          <label for="calc-rule">計算ルール:</label>
          <select id="calc-rule">
            <option value="standard">四則演算優先 (×÷先)</option>
            <option value="left-to-right">左から順に計算</option>
          </select>
        </div>
        <div class="actions">
          <button id="new-game-btn">新しい問題</button>
          <button id="check-btn">答え合わせ</button>
        </div>
      </div>
    </div>

    <div class="board-panel">
      <div class="board" id="board">
        <div class="cell empty"></div>
        <div class="cell number">5</div>
        <div class="cell operator">+</div>
        <div class="cell input is-empty"></div>
        <div class="cell equal">=</div>
        <div class="cell number">12</div>
        </div>
    </div>

    <div class="footer-panel">
      © 2026 Tsubaki & My Lord
    </div>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>数字を入力</h2>
        <button id="close-modal" class="close-btn">&times;</button>
      </div>
      <div class="modal-sub">タップしたマスに数字を入れます</div>
      <div class="keypad">
        <button data-action="1">1</button>
        <button data-action="2">2</button>
        <button data-action="3">3</button>
        <button data-action="4">4</button>
        <button data-action="5">5</button>
        <button data-action="6">6</button>
        <button data-action="7">7</button>
        <button data-action="8">8</button>
        <button data-action="9">9</button>
        <button data-action="clear">クリア</button>
        <button data-action="0">0</button>
        <button data-action="delete">削除</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
