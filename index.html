<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Math Crossword 数字ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Math Crossword 数字ゲーム</h1>
      <p class="subtitle">提供されたサンプル画像の形を固定し、数字だけを差し替えるスマホ向け数式クロスワードです。</p>
    </header>

    <section class="panel controls-panel">
      <div class="control-row">
        <label class="control-field">
          <span>難易度</span>
          <select id="difficultySelect">
            <option value="easy">簡単</option>
            <option value="normal" selected>普通</option>
            <option value="advanced">上級</option>
            <option value="hard">難問</option>
            <option value="expert">超難問</option>
          </select>
        </label>

        <label class="control-field">
          <span>計算ルール</span>
          <select id="calcModeSelect">
            <option value="precedence" selected>四則演算を優先する（×÷先）</option>
            <option value="leftToRight">左から順に計算する</option>
          </select>
        </label>
      </div>

      <div class="button-row">
        <button id="newGameBtn" type="button">新しく作る</button>
        <button id="checkBtn" type="button">チェック</button>
        <button id="clearBtn" type="button">入力クリア</button>
        <button id="showAnswerBtn" type="button">答え表示</button>
      </div>
    </section>

    <section class="panel board-panel">
      <div id="board" class="board" aria-label="Math Crossword 固定形状盤面"></div>
    </section>

    <section class="panel status-panel">
      <div class="status-line">
        <span id="statusText">読み込み中です。</span>
        <span id="progressText">0 / 0</span>
      </div>
      <p class="note">タップできるのは空欄の数字マスだけです。入力は 2 桁までです。</p>
    </section>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">数字を入力</h2>
        <button id="modalCloseBtn" class="icon-button" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modal-display-wrap">
        <div id="modalDisplay" class="modal-display"></div>
        <div id="modalTargetLabel" class="modal-target"></div>
      </div>
      <div class="keypad" id="keypad"></div>
      <div class="modal-actions">
        <button id="modalClearBtn" type="button">クリア</button>
        <button id="modalBackspaceBtn" type="button">1文字削除</button>
        <button id="modalConfirmBtn" type="button" class="primary">決定</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
