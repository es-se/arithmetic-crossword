<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Math Crossword 数字ゲーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero-card">
      <div>
        <h1>Math Crossword</h1>
        <p>数字ゲーム / 固定形状版</p>
      </div>
      <button id="newGameBtn" class="primary-btn">新しく作る</button>
    </header>

    <section class="control-card">
      <div class="control-row">
        <label for="difficulty">難易度</label>
        <select id="difficulty">
          <option value="easy">簡単</option>
          <option value="normal" selected>普通</option>
          <option value="hard">上級</option>
          <option value="expert">難問</option>
          <option value="master">超難問</option>
        </select>
      </div>

      <div class="control-row">
        <label for="calcMode">計算ルール</label>
        <select id="calcMode">
          <option value="precedence" selected>四則演算を優先する（×÷先）</option>
          <option value="left">左から順に計算する</option>
        </select>
      </div>

      <div class="actions-grid">
        <button id="checkBtn">チェック</button>
        <button id="clearBtn">入力を消す</button>
        <button id="answerBtn">答えを見る</button>
      </div>
    </section>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Math Crossword 盤面"></div>
    </section>

    <section class="status-card">
      <div id="message">準備できました。新しい問題を作成できます。</div>
      <div id="progress">0 / 0</div>
    </section>
  </div>

  <div id="numberModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">数字を入力</h2>
        <button id="closeModalBtn" class="ghost-btn" aria-label="閉じる">×</button>
      </div>
      <div class="modal-display-wrap">
        <div id="modalTargetInfo" class="modal-target-info">選択中のマス</div>
        <div id="modalDisplay" class="modal-display">--</div>
      </div>
      <div class="keypad">
        <button class="digit-btn" data-digit="1">1</button>
        <button class="digit-btn" data-digit="2">2</button>
        <button class="digit-btn" data-digit="3">3</button>
        <button class="digit-btn" data-digit="4">4</button>
        <button class="digit-btn" data-digit="5">5</button>
        <button class="digit-btn" data-digit="6">6</button>
        <button class="digit-btn" data-digit="7">7</button>
        <button class="digit-btn" data-digit="8">8</button>
        <button class="digit-btn" data-digit="9">9</button>
        <button id="backspaceBtn" class="wide-btn">←</button>
        <button class="digit-btn" data-digit="0">0</button>
        <button id="clearDigitBtn" class="wide-btn">消す</button>
      </div>
      <div class="modal-actions">
        <button id="applyInputBtn" class="primary-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
